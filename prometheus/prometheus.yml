# Prometheus scrape config cho Dididi.
# booking-platform chay tren HOST (khong trong Docker) -> dung host.docker.internal.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'booking-platform'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: 'dididi-booking-platform'
