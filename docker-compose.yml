# Ha tang dev cho Dididi: MySQL + Redis + Prometheus + Grafana.
# Dung:  docker compose up -d      (bat)
#        docker compose down       (tat, GIU du lieu)
#        docker compose down -v    (tat + XOA du lieu -> lan sau init lai)
services:
  mysql:
    image: mysql:8.0
    container_name: dididi-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root_dev_pass
    ports:
      - "3306:3306"
    volumes:
      - dididi-mysql-data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_dev_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: dididi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - dididi-redis-data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: dididi-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - dididi-prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: dididi-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - dididi-grafana-data:/var/lib/grafana

  minio:
    image: minio/minio:latest
    container_name: dididi-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API S3 (app ket noi)
      - "9001:9001"   # Console web (dang nhap minioadmin/minioadmin de xem anh)
    volumes:
      - dididi-minio-data:/data

volumes:
  dididi-mysql-data:
  dididi-redis-data:
  dididi-prometheus-data:
  dididi-grafana-data:
  dididi-minio-data:
